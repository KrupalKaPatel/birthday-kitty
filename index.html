<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Kitty ❤️</title>

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/animations.css">

    <link rel="stylesheet"
          href="css/responsive.css">

</head>

<body>

    <!-- ==========================================
         Animated Background
    =========================================== -->

    <div id="background">

        <div class="gradient"></div>

        <div id="stars"></div>

    </div>

    <!-- ==========================================
         Loader
    =========================================== -->

    <section id="loader"
             class="screen">

        <div class="glass-card loader-card">

            <h2>
                Collecting Memories...
            </h2>

            <div class="progress">

                <div id="progress-bar"></div>

            </div>

            <p id="loadingText">
                Preparing something special...
            </p>

        </div>

    </section>

    <!-- ==========================================
         Intro
    =========================================== -->

    <section id="intro"
             class="screen hidden">

        <div class="glass-card intro-card">

            <span class="small-title">

                FOR YESHA ❤️

            </span>

            <h1 id="typing">

                Hi Kitty...

            </h1>

            <p id="subtitle">

                Before today begins...

                I want to take you through our beautiful journey.

            </p>

            <button id="beginBtn">

                Begin Our Journey ❤️

            </button>

        </div>

    </section>

    <!-- ==========================================
         Story
    =========================================== -->

    <section id="story"
             class="screen hidden">

        <div class="scene-wrapper">

            <!-- Hero Image -->

            <img id="sceneImage"
                 class="scene-image hidden"
                 alt="Memory">

            <!-- Glass Card -->

            <div class="glass-card scene-card">

                <div class="scene-progress">

                    <span id="sceneCounter">

                        1 / 12

                    </span>

                </div>

                <span id="sceneYear"
                      class="year">

                    2017

                </span>

                <h1 id="sceneTitle">

                    The Beginning

                </h1>

                <p id="sceneText">

                    Every beautiful story begins with one unexpected meeting.

                </p>

                <!-- Navigation -->

                <div class="scene-navigation">

                    <button id="prevBtn"
                            class="secondary-btn">

                        ← Previous

                    </button>

                    <div class="heart">

                        ❤️

                    </div>

                    <button id="nextBtn">

                        Continue →

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- ==========================================
         Footer
    =========================================== -->

    <footer id="footer">

        Made with ❤️ by Herry

    </footer>

    <!-- ==========================================
         Scripts
    =========================================== -->

    <script src="js/scenes.js"></script>

    <script src="js/engine.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/navigation.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
