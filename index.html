<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Kitty ❤️</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- ========================================= -->
    <!-- Animated Background                       -->
    <!-- ========================================= -->

    <div id="background">

        <div class="gradient"></div>

        <div id="stars"></div>

    </div>

    <!-- ========================================= -->
    <!-- Loader                                    -->
    <!-- ========================================= -->

    <section id="loader" class="screen">

        <div class="glass-card">

            <h2>Collecting Memories...</h2>

            <div class="progress">

                <div id="progress-bar"></div>

            </div>

            <p id="loading-text">

                2018

            </p>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- Intro                                     -->
    <!-- ========================================= -->

    <section id="intro" class="screen hidden">

        <div class="glass-card intro-card">

            <span class="small-title">

                FOR YESHA ❤️

            </span>

            <h1 id="typing"></h1>

            <p id="subtitle"></p>

            <button id="beginBtn">

                Begin Our Journey ❤️

            </button>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- Story Scene                               -->
    <!-- ========================================= -->

    <section id="story" class="screen hidden">

        <div class="glass-card scene-card">

            <span id="sceneYear" class="year"></span>

            <h1 id="sceneTitle"></h1>

            <p id="sceneText"></p>

            <button id="nextBtn">

                Continue ❤️

            </button>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- Scripts                                   -->
    <!-- ========================================= -->

    <script src="js/story.js"></script>

    <script src="js/timeline.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
